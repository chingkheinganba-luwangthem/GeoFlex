spring.application.name=geofencing-attendance

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/geofencing_attendance?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8088

# JWT
jwt.secret=GeofencingAttendanceSystemSecretKeyForJWTTokenGeneration2024VeryLongKey
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
