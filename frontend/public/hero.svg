<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#764ba2" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="building" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" rx="24" fill="url(#bg)"/>
  
  <!-- Ground / Platform -->
  <ellipse cx="400" cy="480" rx="320" ry="40" fill="#e8eaf3" opacity="0.7"/>
  
  <!-- Main Building -->
  <rect x="250" y="200" width="300" height="260" rx="12" fill="url(#building)" opacity="0.85"/>
  <rect x="270" y="180" width="260" height="30" rx="6" fill="#4f46e5"/>
  
  <!-- Windows -->
  <rect x="280" y="230" width="50" height="40" rx="6" fill="white" opacity="0.3"/>
  <rect x="350" y="230" width="50" height="40" rx="6" fill="white" opacity="0.3"/>
  <rect x="420" y="230" width="50" height="40" rx="6" fill="white" opacity="0.3"/>
  <rect x="490" y="230" width="40" height="40" rx="6" fill="white" opacity="0.3"/>
  
  <rect x="280" y="290" width="50" height="40" rx="6" fill="white" opacity="0.25"/>
  <rect x="350" y="290" width="50" height="40" rx="6" fill="white" opacity="0.25"/>
  <rect x="420" y="290" width="50" height="40" rx="6" fill="white" opacity="0.25"/>
  <rect x="490" y="290" width="40" height="40" rx="6" fill="white" opacity="0.25"/>
  
  <rect x="280" y="350" width="50" height="40" rx="6" fill="white" opacity="0.2"/>
  <rect x="350" y="350" width="50" height="40" rx="6" fill="white" opacity="0.2"/>
  <rect x="420" y="350" width="50" height="40" rx="6" fill="white" opacity="0.2"/>
  <rect x="490" y="350" width="40" height="40" rx="6" fill="white" opacity="0.2"/>
  
  <!-- Door -->
  <rect x="370" y="400" width="60" height="60" rx="8" fill="#3730a3"/>
  
  <!-- Location Pins -->
  <g transform="translate(200, 120)">
    <path d="M20 0C9 0 0 9 0 20c0 15 20 30 20 30s20-15 20-30C40 9 31 0 20 0z" fill="url(#pin)"/>
    <circle cx="20" cy="18" r="8" fill="white"/>
    <animateTransform attributeName="transform" type="translate" values="200,120;200,110;200,120" dur="3s" repeatCount="indefinite"/>
  </g>
  
  <g transform="translate(500, 100)">
    <path d="M20 0C9 0 0 9 0 20c0 15 20 30 20 30s20-15 20-30C40 9 31 0 20 0z" fill="url(#pin)"/>
    <circle cx="20" cy="18" r="8" fill="white"/>
    <animateTransform attributeName="transform" type="translate" values="500,100;500,90;500,100" dur="4s" repeatCount="indefinite"/>
  </g>
  
  <g transform="translate(350, 80)">
    <path d="M20 0C9 0 0 9 0 20c0 15 20 30 20 30s20-15 20-30C40 9 31 0 20 0z" fill="#6366f1"/>
    <circle cx="20" cy="18" r="8" fill="white"/>
    <animateTransform attributeName="transform" type="translate" values="350,80;350,68;350,80" dur="3.5s" repeatCount="indefinite"/>
  </g>
  
  <!-- Students with phones -->
  <!-- Student 1 -->
  <g>
    <circle cx="150" cy="430" r="20" fill="#a855f7"/>
    <rect x="138" y="450" width="24" height="36" rx="8" fill="#a855f7" opacity="0.8"/>
    <rect x="155" y="440" width="12" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="157" y="443" width="8" height="14" rx="2" fill="#22c55e" opacity="0.7"/>
  </g>
  
  <!-- Student 2 -->
  <g>
    <circle cx="620" cy="420" r="20" fill="#6366f1"/>
    <rect x="608" y="440" width="24" height="36" rx="8" fill="#6366f1" opacity="0.8"/>
    <rect x="625" y="430" width="12" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="627" y="433" width="8" height="14" rx="2" fill="#22c55e" opacity="0.7"/>
  </g>
  
  <!-- Checkmarks -->
  <g transform="translate(135, 395)">
    <circle r="12" fill="#22c55e" opacity="0.9"/>
    <path d="M-5 0L-1 4L6-4" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="135,395;135,390;135,395" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <g transform="translate(635, 385)">
    <circle r="12" fill="#22c55e" opacity="0.9"/>
    <path d="M-5 0L-1 4L6-4" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="635,385;635,380;635,385" dur="2.5s" repeatCount="indefinite"/>
  </g>
  
  <!-- WiFi waves on building -->
  <g transform="translate(400, 170)" opacity="0.4">
    <path d="M-15 0 A15 15 0 0 1 15 0" stroke="#22c55e" stroke-width="2" fill="none"/>
    <path d="M-25 -5 A25 25 0 0 1 25 -5" stroke="#22c55e" stroke-width="2" fill="none"/>
    <path d="M-35 -10 A35 35 0 0 1 35 -10" stroke="#22c55e" stroke-width="2" fill="none"/>
  </g>
</svg>
